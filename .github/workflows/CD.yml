name: CD phase

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

jobs:
  deploy-package:
    # Only run if the pull request was actually merged, not just closed.
    if: github.event.pull_request.merged == true
    # Change this to 'self-hosted' so it executes directly on your EC2 instance!
    runs-on: self-hosted

    steps:        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image from ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          # Using the PR head SHA so it matches the image built during the CI phase
          IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          ECR_IMAGE="${ECR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Pulling image: $ECR_IMAGE"
          docker pull "$ECR_IMAGE"
          # Create a local environment variable for subsequent steps to use safely
          echo "FULL_IMAGE_REF=$ECR_IMAGE" >> $GITHUB_ENV

      - name: Stop and remove old container if exists
        run: |
          docker stop "${CONTAINER_NAME}" || true
          docker rm "${CONTAINER_NAME}" || true

      - name: Start new container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            --restart unless-stopped \
            "$env.FULL_IMAGE_REF"

      - name: Show running containers
        run: docker ps

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              echo "App is healthy!"
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Print health response body
        run: curl --silent "http://127.0.0.1:${APP_PORT}/health"
