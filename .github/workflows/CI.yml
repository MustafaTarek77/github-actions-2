# This workflow packages the verified app.
name: 03 Build Artifact Workflow
on:
  # Allows students to still trigger it manually from the Actions tab.
  workflow_dispatch:
  # Triggers automatically when a PR is opened or updated targeting the main branch.
  pull_request:
    branches:
      - main


env:
  # Keep common image values in one place so the build steps stay readable.
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  IMAGE_METADATA: image-metadata.env
  ARTIFACT_NAME: tiny-health-app-image
  TRIVY_IMAGE_REPORT: trivy-image-scan-report.txt

jobs:
  verify:
    # Same verification idea as Lab 03: scan the source, then run the test suite.
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      # --- TRIVY SECURITY SCANS ---
      - name: Run Trivy Filesystem Scan
        # Updated to use the official safe version tag
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Trivy Dockerfile Configuration Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile'
          scanners: 'misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      # ----------------------------

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        # Same test idea from Lab 03: fail the workflow if the suite fails.
        run: python -m unittest discover -s tests -v

  build-package:
    # Only package the app once verification has passed.
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # Fresh runner, so the repo needs to be checked out again here too.
        uses: actions/checkout@v6

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with docker build
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
            .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}'
          scanners: 'vuln,secret'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: '${{ env.TRIVY_IMAGE_REPORT }}'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          ECR_IMAGE="${ECR_REGISTRY}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          docker tag "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" "$ECR_IMAGE"
          docker push "$ECR_IMAGE"
          echo "Pushed image: $ECR_IMAGE"

      - name: Save image metadata
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_REFERENCE="${ECR_REGISTRY}/${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "${IMAGE_METADATA}"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "${IMAGE_METADATA}"
